<!doctype html>
<html lang="hr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lakat — nema neta</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #09090b;
        color: #f4f4f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2.5rem 1.25rem;
        text-align: center;
      }
      .wordmark {
        font-size: 3rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin: 0;
      }
      .wordmark span {
        color: #4ade80;
      }
      h1 {
        margin: 1rem 0 0;
        font-size: 1.5rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.02em;
      }
      p {
        margin: 0.75rem 0 0;
        font-size: 0.9rem;
        color: #8b8b94;
      }
      button {
        margin-top: 2.5rem;
        height: 4rem;
        width: 100%;
        max-width: 20rem;
        border-radius: 1.25rem;
        border: none;
        background: #4ade80;
        color: #000;
        font-size: 1.25rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        cursor: pointer;
      }
      button:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <p class="wordmark">Lakat<span>.</span></p>
    <h1>Nema neta, nema šanka.</h1>
    <p>Provjeri konekciju pa probaj opet.</p>
    <button type="button" onclick="location.reload()">Probaj opet</button>
  </body>
</html>
