      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        min-height: 100dvh;
        background: #09090b;
        color: #f4f4f5;
        font-family: "Lakat Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        padding: calc(env(safe-area-inset-top) + 2.5rem) 1.5rem calc(env(safe-area-inset-bottom) + 2.5rem);
        text-align: center;
        overflow: hidden;
        position: relative;
        -webkit-font-smoothing: antialiased;
      }
      /* Atmosfera — statični zeleni sjaj (bez animacije = bez štekanja) */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(60% 45% at 50% 12%, rgba(74, 222, 128, 0.14), transparent 70%),
          radial-gradient(50% 40% at 50% 100%, rgba(74, 222, 128, 0.06), transparent 70%);
        pointer-events: none;
        z-index: 0;
      }
      .stage {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 22rem;
        width: 100%;
        animation: rise 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @keyframes rise {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce) {
        .stage { animation: none; }
      }
      .glyph {
        width: 3.25rem;
        height: 3.25rem;
        color: #4ade80;
        margin-bottom: 1.75rem;
        opacity: 0.9;
      }
      .wordmark {
        font-family: "Lakat Display", sans-serif;
        font-size: 2.75rem;
        line-height: 1;
        letter-spacing: 0.01em;
        text-transform: uppercase;
        margin: 0;
      }
      .wordmark .dot { color: #4ade80; }
      h1 {
        font-family: "Lakat Display", sans-serif;
        font-size: 1.7rem;
        line-height: 1.05;
        letter-spacing: 0.01em;
        text-transform: uppercase;
        margin: 1.5rem 0 0;
        font-weight: 400;
      }
      h1 .dot { color: #4ade80; }
      p {
        margin: 0.85rem 0 0;
        font-size: 0.95rem;
        line-height: 1.5;
        color: #8b8b94;
      }
      button {
        font-family: "Lakat Display", sans-serif;
        margin-top: 2.5rem;
        height: 3.75rem;
        width: 100%;
        border-radius: 1.25rem;
        border: none;
        background: #4ade80;
        color: #000;
        font-size: 1.2rem;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow: 0 0 32px rgba(74, 222, 128, 0.35);
        transition: transform 0.12s ease;
        -webkit-tap-highlight-color: transparent;
      }
      button:active { transform: scale(0.97); }
    </style>
  </head>

        <line x1="2" x2="22" y1="2" y2="22" />
        <path d="M8.5 16.5a5 5 0 0 1 7 0" />
        <path d="M2 8.82a15 15 0 0 1 4.17-2.65" />
        <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76" />
        <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68" />
        <path d="M5 13a10 10 0 0 1 5.24-2.76" />
        <line x1="12" x2="12.01" y1="20" y2="20" />
      </svg>
      <p class="wordmark">Lakat<span class="dot">.</span></p>
      <h1>Nema neta, nema šanka<span class="dot">.</span></h1>
      <p>Provjeri konekciju pa se vrati za šank.</p>
      <button type="button" onclick="location.reload()">Probaj opet</button>
    </div>
  </body>
